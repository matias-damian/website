<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matías</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #particles-js {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    z-index: -1;
}
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        #typed-text {
            border-right: 2px solid transparent;
            padding-right: 4px;
            display: inline-block;
        }

        @keyframes blink-caret {
            from, to {
                border-color: transparent
            }
            50% {
                border-color: #FF6B1A
            }
        }

        .typing-active {
            animation: blink-caret 0.75s step-end infinite;
        }

        :root {
            --gradient-1: #FFD700; /* Gold */
            --gradient-2: #FF6B1A; /* Orange */
            --gradient-3: #820909; /* Crimson */
            --bg-dark: #0F0A0A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Text', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            line-height: 1.7;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .hero {
            text-align: center;
            margin: 4rem 0;
            position: relative;
        }

        .hero h1 {
            font-size: 3rem;
            background: linear-gradient(45deg, var(--gradient-1), var(--gradient-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
        }

        .bio-text {
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.1rem;
            color: #CCCCCC;
            position: relative;
            padding: 2rem;
        }

        .highlight {
            background: linear-gradient(45deg, var(--gradient-1), var(--gradient-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 600;
            padding: 0 3px;
        }

        .personal-tag {
            display: inline-block;
            margin: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
        }

        /* Grid Section */
        .media-section {
            margin: 4rem 0;
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            padding-left: 1rem;
            border-left: 4px solid var(--gradient-2);
        }

        .media-section {
            margin: 3rem 0;
        }

        .media-grid {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 1.2rem;
            padding: 1rem 0;
            -ms-overflow-style: none; /* IE y Edge */
            scrollbar-width: none; /* Firefox */
        }

        .media-grid::-webkit-scrollbar {
            display: none;
        }

        .media-card {
            scroll-snap-align: start;
            min-width: 280px;
            width: 280px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1rem;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .media-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .cover-image {
            width: 100%;
            height: 160px;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 0.8rem;
            transition: transform 0.3s ease;
        }

        .media-card:hover .cover-image {
            transform: scale(1.05);
        }

        .media-info {
            padding: 0 0.5rem;
        }

        .media-title {
            font-size: 1rem;
            margin-bottom: 0.2rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .media-subtitle {
            font-size: 0.8rem;
            color: #888;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Badge de categoría */
        .media-category {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            backdrop-filter: blur(5px);
        }

        @media (min-width: 768px) {
            .media-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                overflow: visible;
            }

            .media-card {
                width: auto;
                min-width: auto;
            }
        }

        .highlight {
            background: linear-gradient(45deg, var(--gradient-1), var(--gradient-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 600;
            padding: 0 3px;
        }

        .bio-text p {
            font-size: 1.1rem;
            line-height: 1.8;
            margin: 1.5rem 0;
        }

        /* Eliminar las comillas */
        .bio-text p::before {
            content: none;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2.5rem;
        }

        .social-icon {
            font-size: 1.8rem;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            padding: 0.5rem;
        }

        .social-icon:hover {
            color: transparent;
            background: linear-gradient(45deg, var(--gradient-1), var(--gradient-2));
            -webkit-background-clip: text;
            background-clip: text;
            transform: translateY(-3px);
        }

        .social-icon::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--gradient-1), var(--gradient-2));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .social-icon:hover::after {
            transform: scaleX(1);
        }

        @media (max-width: 768px) {
            .social-icons {
                gap: 1rem;
                margin-top: 2rem;
            }

            .social-icon {
                font-size: 1.5rem;
            }
        }

        .age-text {
            font-size: 1.3rem !important; /* Force override */
            font-weight: 700 !important;
            color: #CCCCCC !important;
            margin: -0.5rem 0 1.5rem !important;
            letter-spacing: -0.5px;
            display: block; /* Ensure it's treated as block element */
        }

        .container {
            padding-bottom: 80px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
            position: relative;
            display: inline-block;
        }

        .hero h1::before {
            content: "Matías";
            visibility: hidden;
            white-space: nowrap;
        }

        /* Updated typed-text styles with gradient */
        #typed-text {
            position: absolute;
            left: 0;
            top: 0;
            background: linear-gradient(45deg, var(--gradient-1), var(--gradient-2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            border-right: 2px solid transparent;
            padding-right: 4px;
            display: inline-block;
        }

        /* Keep existing typing animation styles */
        .typing-active {
            animation: blink-caret 0.75s step-end infinite;
        }
    </style>
</head>
<body>
<div id="particles-js"></div>
<div class="container">
    <section class="hero">
        <div class="bio-text">
            <h1><span id="typed-text"> </span></h1>
            <p id="age-display" class="age-text">
                <noscript>20 años</noscript>
            </p>
            Ingeniero informático con adicción controlada a los tés premium<br>
            Mi rutina perfecta: <br>
            - Tres infusiones diarias de <span class="highlight">té verde y negro</span><br>
            - Playlists que van de <span class="highlight">música tradicional</span> a
            <span class="highlight">electrónica de Akihabara</span><br>
            - Dosis equilibrada de <span class="highlight">animé</span> y
            <span class="highlight">videojuegos</span>
            </p>

        </div>
    </section>
    <div class="social-icons">
        <a href="https://discord.com/users/1056752380126957669" target="_blank" class="social-icon"
           aria-label="Discord">
            <i class="fab fa-discord"></i>
        </a>
        <a href="https://open.spotify.com/user/puftlzz9vhpmaew5u7ly3o2r0?si=GJSJAXVMTHiR9SOJJKUxSA" target="_blank"
           class="social-icon" aria-label="Spotify">
            <i class="fab fa-spotify"></i>
        </a>
        <a href="mailto:matias@matiasdamian.com" target="_blank" class="social-icon" aria-label="Email">
            <i class="fas fa-envelope"></i>
        </a>
        <a href="https://ecologi.com/matias" target="_blank" class="social-icon" aria-label="Ecologi">
            <i class="fas fa-leaf"></i>
        </a>
    </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const typedText = document.getElementById('typed-text');
        const text = "Matías";
        let index = 0;
        const speed = 130;

        function typeCharacter() {
            if (index < text.length) {
                typedText.textContent += text.charAt(index);
                index++;
                setTimeout(typeCharacter, speed);

                // Start cursor animation when typing begins
                if (!typedText.classList.contains('typing-active')) {
                    typedText.classList.add('typing-active');
                }
            }
        }

        // Initialize with empty text
        typedText.textContent = '';

        setTimeout(() => {
            typeCharacter();
        }, 500);

    });

    // Personal tag hover effect
    document.querySelectorAll('.personal-tag').forEach(tag => {
        tag.addEventListener('mouseover', () => {
            tag.style.transform = 'rotate(-2deg) scale(1.05)';
        });

        tag.addEventListener('mouseout', () => {
            tag.style.transform = 'none';
        });
    });
</script>
<script>
    function calculateAge() {
        const birthYear = 2004;
        const birthMonth = 7; // August (0-indexed: 0=January, 7=August)
        const currentDate = new Date();
        const currentYear = currentDate.getFullYear();
        const currentMonth = currentDate.getMonth();

        let age = currentYear - birthYear;

        // Subtract 1 if birthday hasn't occurred yet this year
        if (currentMonth < birthMonth) {
            age--;
        }

        return age;
    }

    // Update age display
    document.getElementById('age-display').textContent = `${calculateAge()} años`;
</script>
<script src="/particles.min.js"></script>

</body>

</html>
